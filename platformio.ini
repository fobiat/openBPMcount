; openBPM — tap-tempo BPM counter & beatmatch assistant
;
; Build environments share one codebase; each pulls in a different display
; front-end via build_src_filter. Pick the one matching your board:
;
;   pio run -e oled -t upload   ideaspark ESP32-WROOM-32 + 0.96" SSD1306 (mono)
;   pio run -e tft  -t upload   ideaspark ESP32-WROOM-32 + 1.14" ST7789  (colour)
;
; Plus a diagnostic build for identifying which GPIO each onboard button uses:
;
;   pio run -e pinscan -t upload && pio device monitor
;
; Buttons: momentary to GND, internal pull-ups, active LOW. Each action accepts
; several pins (onboard + external) — see TAP_PINS/SWAP_PINS/MODE_PINS in
; src/main.cpp.
;
; https://docs.platformio.org/page/projectconf.html

; Default target for the VS Code toolbar buttons and a bare `pio run`.
[platformio]
default_envs = tft

; Shared by the on-device builds only. The native test env must NOT inherit a
; board or framework, so these live here rather than in [env].
[esp32]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

; --- 0.96" SSD1306 OLED, 128x64, I2C (SDA=21, SCL=22, addr 0x3C) ------------
[env:oled]
extends = esp32
build_src_filter = +<*> -<display_tft.cpp> -<pinscan.cpp>
lib_deps =
	olikraus/U8g2@^2.36.18

; --- 1.14" ST7789 TFT, 240x135, SPI ----------------------------------------
; TFT_eSPI is configured entirely from these flags, so the library's
; User_Setup.h is never edited (keeps the build reproducible).
[env:tft]
extends = esp32
build_src_filter = +<*> -<display_oled.cpp> -<pinscan.cpp>
lib_deps =
	bodmer/TFT_eSPI@^2.5.43
build_flags =
	-D USER_SETUP_LOADED=1
	-D ST7789_DRIVER=1
	-D TFT_WIDTH=135
	-D TFT_HEIGHT=240
	-D TFT_MOSI=23
	-D TFT_SCLK=18
	-D TFT_CS=15
	-D TFT_DC=2
	-D TFT_RST=4
	-D TFT_BL=32
	-D TFT_BACKLIGHT_ON=HIGH
	-D LOAD_GLCD=1
	-D LOAD_FONT2=1
	-D LOAD_FONT4=1
	-D LOAD_FONT6=1
	-D LOAD_FONT7=1
	-D LOAD_FONT8=1
	-D SPI_FREQUENCY=40000000

; --- Diagnostic: report which GPIO each button is wired to ------------------
[env:pinscan]
extends = esp32
build_src_filter = +<pinscan.cpp>

; --- Desktop unit tests for the BPM engine ---------------------------------
; app.cpp has no Arduino dependency (Deck takes the current time as a
; parameter), so the whole tempo/beatmatch engine is testable without a board:
;   pio test -e native
[env:native]
platform = native
test_build_src = yes
build_src_filter = +<app.cpp>
build_flags = -std=gnu++11 -Isrc
